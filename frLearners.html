<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>French Vocabulary — Learn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --navy: #0f1b2d;
            --cream: #f5f0e8;
            --gold: #c9943a;
            --gold-light: #e8b84b;
            --blue-mid: #1a3a5c;
            --blue-light: #2c5f8a;
            --red: #c0392b;
            --green: #27ae60;
            --card-bg: #162439;
            --text-muted: #8a9bb0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--navy);
            color: var(--cream);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            text-align: center;
            padding: 3rem 1rem 2rem;
            position: relative;
            border-bottom: 1px solid rgba(201, 148, 58, 0.2);
        }

        header::before {
            content: '🇫🇷';
            font-size: 2rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--gold);
            letter-spacing: 0.02em;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        /* STATS BAR */
        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .stat {
            text-align: center;
        }

        .stat-num {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--gold);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* MAIN LAYOUT */
        .app {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: calc(100vh - 180px);
            min-height: 500px;
        }

        /* SIDEBAR */
        .sidebar {
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            overflow-y: auto;
            padding: 1rem 0;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(201, 148, 58, 0.3);
            border-radius: 2px;
        }

        .sidebar-search {
            margin: 0 1rem 1rem;
            position: relative;
        }

        .sidebar-search input {
            width: 100%;
            padding: 0.6rem 0.8rem 0.6rem 2.2rem;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--cream);
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .sidebar-search input:focus {
            border-color: var(--gold);
        }

        .sidebar-search::before {
            content: '🔍';
            position: absolute;
            left: 0.6rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
        }

        .map-btn {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            width: 100%;
            padding: 0.65rem 1.2rem;
            background: none;
            border: none;
            color: var(--cream);
            cursor: pointer;
            text-align: left;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }

        .map-btn:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .map-btn.active {
            background: rgba(201, 148, 58, 0.1);
            border-left-color: var(--gold);
            color: var(--gold-light);
            font-weight: 500;
        }

        .map-btn .map-num {
            font-size: 0.7rem;
            color: var(--text-muted);
            min-width: 30px;
            font-family: monospace;
        }

        .map-btn .map-count {
            margin-left: auto;
            font-size: 0.7rem;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.06);
            padding: 0.1rem 0.4rem;
            border-radius: 10px;
        }

        .map-btn.active .map-count {
            background: rgba(201, 148, 58, 0.2);
            color: var(--gold);
        }

        /* MAIN CONTENT */
        .main {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* MODE TABS */
        .mode-bar {
            display: flex;
            gap: 0.5rem;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }

        .mode-btn {
            padding: 0.5rem 1.1rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: none;
            color: var(--text-muted);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .mode-btn:hover {
            border-color: rgba(201, 148, 58, 0.4);
            color: var(--cream);
        }

        .mode-btn.active {
            background: var(--gold);
            border-color: var(--gold);
            color: var(--navy);
            font-weight: 600;
        }

        /* BROWSE MODE */
        #browse-view {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        #browse-view::-webkit-scrollbar {
            width: 4px;
        }

        #browse-view::-webkit-scrollbar-thumb {
            background: rgba(201, 148, 58, 0.3);
            border-radius: 2px;
        }

        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.8rem;
        }

        .vocab-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 1.1rem 1.2rem;
            transition: all 0.2s;
            cursor: default;
        }

        .vocab-card:hover {
            border-color: rgba(201, 148, 58, 0.3);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .vocab-fr {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--cream);
            margin-bottom: 0.3rem;
        }

        .vocab-en {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .map-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--gold);
            margin-bottom: 0.3rem;
        }

        .map-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 1.2rem;
        }

        /* FLASHCARD MODE */
        #flashcard-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            gap: 1.5rem;
        }

        #flashcard-view.hidden,
        #browse-view.hidden,
        #quiz-view.hidden {
            display: none;
        }

        .fc-progress {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .fc-card {
            width: 100%;
            max-width: 520px;
            height: 220px;
            perspective: 1000px;
            cursor: pointer;
        }

        .fc-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fc-inner.flipped {
            transform: rotateY(180deg);
        }

        .fc-front,
        .fc-back {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .fc-front {
            background: linear-gradient(135deg, var(--blue-mid), var(--blue-light));
            border: 1px solid rgba(201, 148, 58, 0.3);
        }

        .fc-back {
            background: linear-gradient(135deg, #1a3a1a, #2a5a2a);
            border: 1px solid rgba(39, 174, 96, 0.4);
            transform: rotateY(180deg);
        }

        .fc-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 0.8rem;
        }

        .fc-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.1rem, 3vw, 1.6rem);
            color: var(--cream);
            line-height: 1.4;
        }

        .fc-hint {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 1rem;
        }

        .fc-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .fc-btn {
            padding: 0.7rem 1.8rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: var(--cream);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .fc-btn:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .fc-btn.primary {
            background: var(--gold);
            border-color: var(--gold);
            color: var(--navy);
            font-weight: 600;
        }

        .fc-btn.primary:hover {
            background: var(--gold-light);
        }

        .fc-opt {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .fc-opt label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* QUIZ MODE */
        #quiz-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            gap: 1.5rem;
        }

        .quiz-question {
            text-align: center;
            max-width: 560px;
            width: 100%;
        }

        .quiz-q-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.5rem;
        }

        .quiz-q-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: var(--cream);
            margin-bottom: 0.3rem;
        }

        .quiz-direction {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .quiz-choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            max-width: 560px;
            width: 100%;
        }

        .choice-btn {
            padding: 0.9rem 1rem;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--cream);
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            text-align: left;
            transition: all 0.2s;
            line-height: 1.3;
        }

        .choice-btn:hover:not(:disabled) {
            border-color: rgba(201, 148, 58, 0.4);
            background: rgba(201, 148, 58, 0.08);
        }

        .choice-btn.correct {
            border-color: var(--green);
            background: rgba(39, 174, 96, 0.15);
            color: #6ee89f;
        }

        .choice-btn.wrong {
            border-color: var(--red);
            background: rgba(192, 57, 43, 0.15);
            color: #ff8a80;
        }

        .choice-btn:disabled {
            cursor: default;
        }

        .quiz-score {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 1.5rem;
        }

        .score-correct {
            color: var(--green);
            font-weight: 600;
        }

        .score-wrong {
            color: var(--red);
            font-weight: 600;
        }

        .quiz-next {
            display: none;
            padding: 0.7rem 2.5rem;
            background: var(--gold);
            border: none;
            border-radius: 12px;
            color: var(--navy);
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .quiz-next:hover {
            background: var(--gold-light);
        }

        /* ALL MODE */
        #all-banner {
            padding: 1rem 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .app {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                height: auto;
            }

            .sidebar {
                height: 200px;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            }

            .quiz-choices {
                grid-template-columns: 1fr;
            }

            .stats {
                gap: 1rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Vocabulaire Français</h1>
        <p>1,483 words across 98 topic maps — from your course vocabulary</p>
    </header>

    <div class="stats">
        <div class="stat">
            <div class="stat-num" id="stat-maps">98</div>
            <div class="stat-label">Maps</div>
        </div>
        <div class="stat">
            <div class="stat-num" id="stat-words">1483</div>
            <div class="stat-label">Words</div>
        </div>
        <div class="stat">
            <div class="stat-num" id="stat-studied">0</div>
            <div class="stat-label">Studied</div>
        </div>
        <div class="stat">
            <div class="stat-num" id="stat-score">—</div>
            <div class="stat-label">Quiz Score</div>
        </div>
    </div>

    <div class="app">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-search">
                <input type="text" id="map-search" placeholder="Filter topics..." oninput="filterMaps()">
            </div>
            <div id="map-list"></div>
        </aside>

        <!-- MAIN -->
        <main class="main">
            <div class="mode-bar">
                <button class="mode-btn active" onclick="setMode('browse')">📖 Browse</button>
                <button class="mode-btn" onclick="setMode('flashcard')">🃏 Flashcards</button>
                <button class="mode-btn" onclick="setMode('quiz')">✏️ Quiz</button>
            </div>

            <!-- BROWSE -->
            <div id="browse-view">
                <div class="map-title" id="browse-title">Select a topic</div>
                <div class="map-subtitle" id="browse-subtitle"></div>
                <div class="vocab-grid" id="vocab-grid"></div>
            </div>

            <!-- FLASHCARD -->
            <div id="flashcard-view" class="hidden">
                <div class="fc-progress" id="fc-progress">Card 1 of 1</div>
                <div class="fc-card" onclick="flipCard()" id="fc-card">
                    <div class="fc-inner" id="fc-inner">
                        <div class="fc-front">
                            <div class="fc-label">French</div>
                            <div class="fc-text" id="fc-front-text">—</div>
                            <div class="fc-hint">click to reveal</div>
                        </div>
                        <div class="fc-back">
                            <div class="fc-label">English</div>
                            <div class="fc-text" id="fc-back-text">—</div>
                        </div>
                    </div>
                </div>
                <div class="fc-controls">
                    <button class="fc-btn" onclick="fcNav(-1)">← Prev</button>
                    <button class="fc-btn primary" onclick="fcNav(1)">Next →</button>
                </div>
                <div class="fc-opt">
                    <label><input type="checkbox" id="fc-shuffle" onchange="fcShuffle()"> Shuffle</label>
                    <label style="margin-left:1rem"><input type="checkbox" id="fc-reverse"> English → French</label>
                </div>
            </div>

            <!-- QUIZ -->
            <div id="quiz-view" class="hidden">
                <div class="quiz-score">
                    <span>✅ <span class="score-correct" id="q-correct">0</span></span>
                    <span>❌ <span class="score-wrong" id="q-wrong">0</span></span>
                    <span id="q-total-label" style="color:var(--text-muted)">of 0</span>
                </div>
                <div class="quiz-question">
                    <div class="quiz-q-label" id="q-label">Translate to English</div>
                    <div class="quiz-q-text" id="q-text">—</div>
                    <div class="quiz-direction" id="q-dir"></div>
                </div>
                <div class="quiz-choices" id="q-choices"></div>
                <button class="quiz-next" id="quiz-next" onclick="nextQuestion()">Next →</button>
            </div>
        </main>
    </div>

    <script>

ives" }, { "map": 99, "items": [["coûter", "to cost"], ["dépenser", "to spend"], ["rembourser", "to reimburse"], ["emprunter", "borrow"], ["avoir les moyens de", "to have the means to"], ["louer", "to rent"], ["faire un budget", "to establish a budget"], ["dépasser son budget", "to go beyond one's budget"], ["avoir des dettes", "to have debts"], ["gaspiller", "to waste"], ["faire des économies", "to save money"], ["offrir", "to give, to offer"]], "label": "Money Verbs" }, { "map": 100, "items": [["un couple", "couple"], ["le coup de foudre", "love at first sight"], ["l'amour passion (m)", "passionate love"], ["le grand amour", "the love of one's life"], ["un rendez-vous", "date (also an appointment)"], ["une relation", "relationship"], ["les fiançailles (f pl)", "engagement"], ["un fiancé / une fiancée", "fiancé / fiancée"], ["le mariage", "marriage, wedding"], ["la compatibilité", "compatibility / matching"], ["l'apparence physique", "physical appearance"], ["le bonheur", "happiness"], ["la communication", "interaction / communication"], ["le sens de l'humour", "sense of humor"], ["le respect", "respect"], ["l'honnêteté (f)", "honesty"], ["le romantisme", "romanticism"]], "label": "Love & Relationships" }, { "map": 101, "items": [["draguer", "to try to pick up, to hit on someone, to flirt"], ["être amis", "to be friends"], ["vivre ensemble", "to live together"], ["s'embrasser", "to kiss each other"], ["s'aimer", "to love each other"], ["se pacser", "to enter a PACS contract"], ["se fiancer", "to get engaged"], ["se marier", "to get married"], ["rompre", "to break up"], ["divorcer", "to get divorced"], ["tromper", "to cheat on"]], "label": "Relationship Verbs" }, { "map": 102, "items": [["Quel est ton signe?", "What's your sign?"], ["le signe", "sign"], ["le Capricorne", "Capricorn"], ["le Verseau", "Aquarius"], ["les Poissons (m)", "Pisces"], ["le Bélier", "Aries"], ["le Taureau", "Taurus"], ["les Gémeaux (m)", "Gemini"], ["le Cancer", "Cancer"], ["le Lion", "Leo"], ["la Vierge", "Virgo"], ["la Balance", "Libra"], ["le Scorpion", "Scorpio"], ["le Sagittaire", "Sagittarius"]], "label": "Horoscope Signs" }];

        let currentMap = null;
        let currentItems = [];
        let mode = 'browse';

        // Flashcard state
        let fcIndex = 0;
        let fcItems = [];
        let fcFlipped = false;

        // Quiz state
        let qCorrect = 0, qWrong = 0, qTotal = 0;
        let qCurrent = null;
        let qAnswered = false;

        // Stats
        let studiedSet = new Set();

        // Build sidebar
        function buildSidebar() {
            const list = document.getElementById('map-list');
            list.innerHTML = '';
            const query = document.getElementById('map-search').value.toLowerCase();

            VOCAB.forEach(m => {
                if (query && !m.label.toLowerCase().includes(query) && !String(m.map).includes(query)) return;
                const btn = document.createElement('button');
                btn.className = 'map-btn' + (currentMap === m.map ? ' active' : '');
                btn.innerHTML = `<span class="map-num">${String(m.map).padStart(3, '0')}</span><span>${m.label}</span><span class="map-count">${m.items.length}</span>`;
                btn.onclick = () => selectMap(m.map);
                list.appendChild(btn);
            });
        }

        function filterMaps() { buildSidebar(); }

        function selectMap(mapNum) {
            currentMap = mapNum;
            const map = VOCAB.find(m => m.map === mapNum);
            currentItems = map ? map.items : [];
            fcItems = [...currentItems];
            fcIndex = 0;
            fcFlipped = false;
            buildSidebar();
            renderCurrent();
        }

        function setMode(m) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach((b, i) => {
                b.classList.toggle('active', ['browse', 'flashcard', 'quiz'][i] === m);
            });
            document.getElementById('browse-view').classList.toggle('hidden', m !== 'browse');
            document.getElementById('flashcard-view').classList.toggle('hidden', m !== 'flashcard');
            document.getElementById('quiz-view').classList.toggle('hidden', m !== 'quiz');
            renderCurrent();
        }

        function renderCurrent() {
            if (mode === 'browse') renderBrowse();
            else if (mode === 'flashcard') renderFlashcard();
            else if (mode === 'quiz') startQuiz();
        }

        // BROWSE
        function renderBrowse() {
            const map = VOCAB.find(m => m.map === currentMap);
            const title = document.getElementById('browse-title');
            const sub = document.getElementById('browse-subtitle');
            const grid = document.getElementById('vocab-grid');

            if (!map) {
                title.textContent = 'Select a topic';
                sub.textContent = 'Choose a word map from the sidebar to start browsing.';
                grid.innerHTML = '';
                return;
            }

            title.textContent = map.label;
            sub.textContent = `Word Map ${String(map.map).padStart(3, '0')} · ${map.items.length} expressions`;
            grid.innerHTML = map.items.map(([fr, en]) => `
    <div class="vocab-card">
      <div class="vocab-fr">${escHtml(fr)}</div>
      <div class="vocab-en">${escHtml(en)}</div>
    </div>
  `).join('');

            map.items.forEach(([fr]) => studiedSet.add(fr));
            document.getElementById('stat-studied').textContent = studiedSet.size;
        }

        // FLASHCARD
        function renderFlashcard() {
            if (!currentItems.length) return;
            const isReverse = document.getElementById('fc-reverse').checked;
            const item = fcItems[fcIndex];
            const [fr, en] = item;

            document.getElementById('fc-progress').textContent = `Card ${fcIndex + 1} of ${fcItems.length}`;
            document.getElementById('fc-front-text').textContent = isReverse ? en : fr;
            document.getElementById('fc-back-text').textContent = isReverse ? fr : en;

            const inner = document.getElementById('fc-inner');
            inner.classList.remove('flipped');
            fcFlipped = false;

            // Mark studied
            studiedSet.add(fr);
            document.getElementById('stat-studied').textContent = studiedSet.size;
        }

        function flipCard() {
            const inner = document.getElementById('fc-inner');
            fcFlipped = !fcFlipped;
            inner.classList.toggle('flipped', fcFlipped);
        }

        function fcNav(dir) {
            if (!fcItems.length) return;
            fcIndex = (fcIndex + dir + fcItems.length) % fcItems.length;
            renderFlashcard();
        }

        function fcShuffle() {
            if (document.getElementById('fc-shuffle').checked) {
                fcItems = [...currentItems].sort(() => Math.random() - 0.5);
            } else {
                fcItems = [...currentItems];
            }
            fcIndex = 0;
            renderFlashcard();
        }

        // QUIZ
        function startQuiz() {
            if (!currentItems.length) return;
            nextQuestion();
        }

        function nextQuestion() {
            if (!currentItems.length) return;
            qAnswered = false;
            document.getElementById('quiz-next').style.display = 'none';

            // Pick random question item
            const idx = Math.floor(Math.random() * currentItems.length);
            qCurrent = currentItems[idx];
            const isReverse = Math.random() > 0.5;

            const [fr, en] = qCurrent;
            const qText = isReverse ? en : fr;
            const correctAns = isReverse ? fr : en;

            document.getElementById('q-label').textContent = isReverse ? 'Translate to French' : 'Translate to English';
            document.getElementById('q-text').textContent = qText;

            // Generate 3 wrong answers from same map
            const pool = currentItems.filter(item => item !== qCurrent);
            const wrongs = [];
            const shuffled = [...pool].sort(() => Math.random() - 0.5);
            for (let item of shuffled) {
                if (wrongs.length >= 3) break;
                const ans = isReverse ? item[0] : item[1];
                if (ans !== correctAns) wrongs.push(ans);
            }

            const choices = [correctAns, ...wrongs].sort(() => Math.random() - 0.5);

            const choicesDiv = document.getElementById('q-choices');
            choicesDiv.innerHTML = '';
            choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice;
                btn.onclick = () => answerQuiz(choice, correctAns, btn);
                choicesDiv.appendChild(btn);
            });

            qTotal++;
            document.getElementById('q-total-label').textContent = `of ${qTotal}`;
        }

        function answerQuiz(chosen, correct, btn) {
            if (qAnswered) return;
            qAnswered = true;

            const isCorrect = chosen === correct;
            if (isCorrect) {
                qCorrect++;
                btn.classList.add('correct');
            } else {
                qWrong++;
                btn.classList.add('wrong');
                // Highlight correct
                document.querySelectorAll('.choice-btn').forEach(b => {
                    if (b.textContent === correct) b.classList.add('correct');
                });
            }

            document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
            document.getElementById('q-correct').textContent = qCorrect;
            document.getElementById('q-wrong').textContent = qWrong;

            const pct = Math.round(qCorrect / (qCorrect + qWrong) * 100);
            document.getElementById('stat-score').textContent = pct + '%';

            document.getElementById('quiz-next').style.display = 'inline-block';
        }

        function escHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Init
        buildSidebar();
        // Select first map
        if (VOCAB.length > 0) selectMap(VOCAB[0].map);
    </script>
